<!doctype html>
<html lang="it" data-lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sundarban Ristorante — Indiano a Roma</title>
<meta name="description" content="Sundarban Ristorante Indiano — sapori autentici del Bengala nel cuore di Roma. Pranzo, cena, asporto e consegna a domicilio." />

<link rel="icon" href="assets/logo.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" />

<link rel="stylesheet" href="styles.css" />

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "framer-motion": "https://esm.sh/framer-motion@11.11.17?deps=react@18.3.1,react-dom@18.3.1"
  }
}
</script>
</head>
<body>
<div id="root"></div>

<script type="module">
  import * as React from 'react';
  import * as ReactDOMClient from 'react-dom/client';
  import * as FM from 'framer-motion';
  window.React = React.default || React;
  // Spread named exports so `useState` etc. exist on window.React
  Object.assign(window.React, React);
  window.ReactDOM = ReactDOMClient;
  window.FM = FM;
  window.dispatchEvent(new Event('libs-ready'));
</script>
<script>
  window.addEventListener('libs-ready', () => {
    const babel = document.createElement('script');
    babel.src = 'https://unpkg.com/@babel/standalone@7.29.0/babel.min.js';
    babel.integrity = 'sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y';
    babel.crossOrigin = 'anonymous';
    babel.onload = async () => {
      try {
        const res = await fetch('app.jsx');
        const src = await res.text();
        const out = Babel.transform(src, { presets: ['react'] });
        const tag = document.createElement('script');
        tag.textContent = out.code;
        document.body.appendChild(tag);
      } catch (e) {
        console.error('App boot failed', e);
      }
    };
    document.head.appendChild(babel);
  });
</script>
</body>
</html>
